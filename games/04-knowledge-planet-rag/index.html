<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>知識星球探險｜迷你 RAG 問答遊戲</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;color:#edfaff;font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 20% 14%,rgba(105,231,255,.13),transparent 23rem),linear-gradient(180deg,#081229,#050915 62%,#02040b)}
    main{width:min(96vw,1120px);padding:16px;border:1px solid rgba(105,231,255,.24);border-radius:12px;background:rgba(8,18,36,.88);box-shadow:0 28px 80px rgba(0,0,0,.45)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}h1{margin:0;font-size:clamp(1.25rem,3vw,2rem)}
    .hud{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;min-width:112px;border:1px solid rgba(105,231,255,.28);border-radius:7px;background:rgba(2,10,22,.66);color:#98b5c6}.chip strong{margin-left:6px;color:#edfaff}
    .shell{position:relative;width:100%;aspect-ratio:16/9;border:1px solid rgba(105,231,255,.36);border-radius:10px;overflow:hidden;background:#020612}canvas{display:block;width:100%;height:100%}
    .station{position:absolute;left:20px;right:20px;bottom:20px;display:none;grid-template-columns:1fr 1.15fr;gap:14px;padding:14px;border:1px solid rgba(105,231,255,.38);border-radius:10px;background:rgba(3,10,22,.92)}.station.active{display:grid}
    h2,h3{margin:0 0 8px;color:#69e7ff;font-size:1rem}p{margin:0 0 10px;color:#98b5c6;line-height:1.55;font-size:.9rem}.row{display:flex;gap:8px}input{width:100%;padding:11px;border:1px solid rgba(105,231,255,.35);border-radius:7px;background:rgba(255,255,255,.06);color:#edfaff;font:inherit}button{padding:11px;border:1px solid rgba(105,231,255,.46);border-radius:7px;background:rgba(105,231,255,.12);color:#edfaff;font:inherit}.answer{min-height:158px;max-height:220px;overflow:auto;padding:12px;border:1px solid rgba(255,255,255,.12);border-radius:8px;background:rgba(255,255,255,.055);line-height:1.6}.source{color:#ffd166;font-weight:700}.score{color:#76f3a5}.help{margin-top:12px;color:#98b5c6;font-size:.9rem;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}kbd{padding:2px 7px;border:1px solid rgba(237,250,255,.28);border-radius:5px;background:rgba(255,255,255,.08)}
    @media(max-width:780px){.station.active{grid-template-columns:1fr}.station{max-height:62%;overflow:auto;left:10px;right:10px;bottom:10px}}
  </style>
</head>
<body>
<main>
  <section class="top"><h1>知識星球探險</h1><div class="hud"><div class="chip">知識能量<strong id="energyText">0</strong></div><div class="chip">已探索<strong id="exploredText">0 / 4</strong></div><div class="chip">任務進度<strong id="progressText">0 / 4</strong></div><div class="chip">狀態<strong id="stateText">待命</strong></div></div></section>
  <section class="shell"><canvas id="game" width="960" height="540"></canvas><aside id="panel" class="station"><div><h2 id="title">知識站</h2><p id="mission">靠近星球並按 E 進入知識站。</p><p>輸入問題後，系統會模擬 RAG：先檢索內建知識庫，再顯示來源與整理後回答。</p><div class="row"><input id="q" autocomplete="off" placeholder="例如：AI 是什麼？"><button id="ask">查詢</button></div></div><div><h3>檢索結果</h3><div id="answer" class="answer">尚未查詢。請輸入問題後按 Enter。</div></div></aside></section>
  <section class="help"><span><kbd>Enter</kbd> 開始　<kbd>WASD</kbd> 或方向鍵移動　<kbd>E</kbd> 進入知識站</span><span>輸入問題後按 <kbd>Enter</kbd> 查詢，按 <kbd>Esc</kbd> 離開</span></section>
</main>
<script>
  // 知識星球探險：以本機陣列模擬 RAG 檢索、來源呈現與回答整理，不使用外部 API。
  const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  const energyText=document.getElementById("energyText"),exploredText=document.getElementById("exploredText"),progressText=document.getElementById("progressText"),stateText=document.getElementById("stateText"),panel=document.getElementById("panel"),title=document.getElementById("title"),mission=document.getElementById("mission"),q=document.getElementById("q"),answer=document.getElementById("answer"),ask=document.getElementById("ask");
  const keys=new Set(),stars=[],cards=[],explored=new Set(),done=new Set();
  const planets=[{id:"ai",name:"AI 星球",icon:"AI",color:"#69e7ff",x:188,y:156,r:46,mission:"指定問題：AI 是什麼？",words:["ai","人工智慧","智慧"]},{id:"eco",name:"環保星球",icon:"ECO",color:"#76f3a5",x:744,y:145,r:48,mission:"指定問題：如何節能減碳？",words:["節能","減碳","環保","回收"]},{id:"safe",name:"校安星球",icon:"SAFE",color:"#ffd166",x:246,y:392,r:50,mission:"指定問題：校園安全要注意什麼？",words:["校園","安全","霸凌","通報"]},{id:"code",name:"程式星球",icon:"CODE",color:"#ff8ab3",x:728,y:384,r:46,mission:"指定問題：程式設計是什麼？",words:["程式","設計","javascript","除錯"]}];
  const kb=[{topic:"AI",title:"AI 入門知識卡",keywords:["AI","人工智慧","機器學習","資料","模型","預測","生成"],content:"AI 是讓電腦模擬人類智慧的方法，常見能力包含辨識、分類、預測與生成。AI 通常需要資料訓練模型，再用模型協助完成任務。"},{topic:"AI",title:"RAG 檢索增強生成",keywords:["RAG","檢索","知識庫","來源","生成","回答"],content:"RAG 是先從知識庫檢索相關資料，再把資料整理成回答的方法。它能讓回答更有依據，也方便顯示來源。"},{topic:"環保",title:"節能減碳行動",keywords:["環保","節能","減碳","關燈","省電","交通","回收"],content:"節能減碳可從隨手關燈、使用節能設備、搭乘大眾運輸、減少一次性用品與做好資源回收開始。"},{topic:"環保",title:"資源回收原則",keywords:["回收","分類","塑膠","紙類","清洗","再利用"],content:"資源回收重點是分類清楚、簡單清洗、壓扁減少體積，並交給正確回收管道。"},{topic:"校園安全",title:"校園安全守則",keywords:["校園","安全","走廊","通報","陌生人","危險"],content:"校園安全包含不在走廊奔跑、注意樓梯、遇到陌生人或危險狀況要通知師長。"},{topic:"校園安全",title:"反霸凌與求助",keywords:["霸凌","求助","同學","老師","通報","尊重"],content:"遇到霸凌時不要獨自承受，可向老師、家長或輔導資源求助；旁觀者也能陪伴並協助通報。"},{topic:"程式設計",title:"程式設計基礎",keywords:["程式","設計","演算法","變數","條件","迴圈","JavaScript"],content:"程式設計是把問題拆解成步驟交給電腦執行，常見概念包含變數、條件、迴圈、函式與演算法。"},{topic:"程式設計",title:"除錯與測試",keywords:["除錯","測試","錯誤","console","流程","修正"],content:"除錯是找出程式錯誤並修正的過程，可用 console 觀察變數、檢查流程，再用測試確認功能。"}];
  const player={x:W/2,y:H/2,r:16,speed:245,angle:-Math.PI/2};let state="ready",active=null,near=null,energy=0,last=0,time=0;
  for(let i=0;i<150;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.7+.35,s:Math.random()*34+12,a:Math.random()*.65+.22});
  addEventListener("keydown",e=>{if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.code))e.preventDefault();if(e.code==="Enter"){if(state==="ready"||state==="complete")start();else if(state==="station"&&document.activeElement===q)query()}if(e.code==="KeyE"&&state==="playing"&&near)enter(near);if(e.code==="Escape"&&state==="station")leave();keys.add(e.code)});addEventListener("keyup",e=>keys.delete(e.code));ask.onclick=query;
  function start(){state="playing";Object.assign(player,{x:W/2,y:H/2});active=null;near=null;energy=0;explored.clear();done.clear();cards.length=0;panel.classList.remove("active");q.value="";answer.innerHTML="尚未查詢。請輸入問題後按 Enter。";hud()}
  function enter(p){active=p;state="station";panel.classList.add("active");title.textContent=p.name+"｜知識站";mission.textContent=p.mission;q.placeholder={ai:"例如：RAG 是什麼？AI 是什麼？",eco:"例如：如何節能減碳？",safe:"例如：校園安全要注意什麼？",code:"例如：程式設計是什麼？"}[p.id];answer.innerHTML="請輸入與此星球主題相關的問題。";setTimeout(()=>q.focus(),50);hud()}
  function leave(){state="playing";active=null;panel.classList.remove("active");hud()}
  function query(){if(!active)return;const text=q.value.trim();if(!text){answer.textContent="請先輸入一個問題。";return}const result=retrieve(text,active);animateCards(active,result.matches);if(!result.best){answer.innerHTML=`<span class="source">目前沒有找到相關來源</span><br>知識庫目前沒有與「${esc(text)}」足夠相關的資料。`;return}const first=!explored.has(active.id);explored.add(active.id);energy+=first?30:15;if(active.words.some(w=>text.toLowerCase().includes(w.toLowerCase())))done.add(active.id);answer.innerHTML=`<span class="source">來源：${esc(result.best.title)}（${esc(result.best.topic)}）</span><br><span class="score">相關度：${result.best.score} 分｜檢索到 ${result.matches.length} 筆候選資料</span><br><br><b>整理後回答：</b><br>${esc(result.answer)}`;if(done.size===planets.length){state="complete";panel.classList.remove("active")}hud()}
  function retrieve(text,p){const tokens=tokenize(text);const scored=kb.map(item=>{let score=0,hay=`${item.topic} ${item.title} ${item.keywords.join(" ")} ${item.content}`.toLowerCase();for(const tk of tokens){if(item.topic.toLowerCase().includes(tk))score+=5;if(item.title.toLowerCase().includes(tk))score+=4;if(item.keywords.some(k=>k.toLowerCase().includes(tk)||tk.includes(k.toLowerCase())))score+=6;if(hay.includes(tk))score+=2}if(matchTopic(item.topic,p.id))score+=3;return{...item,score}}).filter(i=>i.score>=5).sort((a,b)=>b.score-a.score).slice(0,3);const best=scored[0]||null;return{best,matches:scored,answer:best?`根據「${best.title}」的內容，${best.content} 針對你的問題「${text}」，可以先抓住重點：${action(best.topic)}`:""}}
  function tokenize(text){const lower=text.toLowerCase(),dict=["rag","ai","人工智慧","機器學習","模型","資料","檢索","知識庫","來源","環保","節能","減碳","回收","分類","校園","安全","霸凌","求助","通報","程式","設計","javascript","演算法","變數","迴圈","函式","除錯","測試"],out=[];for(const w of dict)if(lower.includes(w.toLowerCase()))out.push(w.toLowerCase());lower.replace(/[，。！？、；：「」『』（）()]/g," ").split(/\s+/).filter(w=>w.length>=2).forEach(w=>out.push(w));return[...new Set(out)]}
  function matchTopic(topic,id){return(id==="ai"&&topic==="AI")||(id==="eco"&&topic==="環保")||(id==="safe"&&topic==="校園安全")||(id==="code"&&topic==="程式設計")}function action(topic){return{AI:"先檢索可信資料，再整理成可追溯來源的回答。",環保:"從日常行動開始，減少浪費並養成節能習慣。",校園安全:"注意環境風險，遇到問題要主動求助與通報。",程式設計:"把問題拆成步驟，用邏輯、測試與除錯完成任務。"}[topic]}
  function animateCards(p,m){for(let i=0;i<Math.max(1,m.length);i++)cards.push({x:p.x,y:p.y,tx:W/2-70+i*70,ty:H/2-22+i*12,life:.82+i*.08,max:.82+i*.08,c:m[i]?p.color:"#7890a0",label:m[i]?m[i].title.slice(0,4):"無資料"})}
  function hud(){energyText.textContent=energy;exploredText.textContent=`${explored.size} / 4`;progressText.textContent=`${done.size} / 4`;stateText.textContent=state==="ready"?"待命":state==="playing"?"探索中":state==="station"?"知識站":"知識探險家"}
  function update(dt){time+=dt;for(const s of stars){s.y+=s.s*dt;if(s.y>H){s.y=-4;s.x=Math.random()*W}}for(let i=cards.length-1;i>=0;i--){cards[i].life-=dt;if(cards[i].life<=0)cards.splice(i,1)}if(state!=="playing")return;const dx=(keys.has("KeyD")||keys.has("ArrowRight"))-(keys.has("KeyA")||keys.has("ArrowLeft")),dy=(keys.has("KeyS")||keys.has("ArrowDown"))-(keys.has("KeyW")||keys.has("ArrowUp")),len=Math.hypot(dx,dy)||1;if(dx||dy)player.angle=Math.atan2(dy,dx)+Math.PI/2;player.x=clamp(player.x+dx/len*player.speed*dt,player.r,W-player.r);player.y=clamp(player.y+dy/len*player.speed*dt,player.r,H-player.r);near=planets.find(p=>Math.hypot(player.x-p.x,player.y-p.y)<p.r+46)||null;hud()}
  function draw(){ctx.clearRect(0,0,W,H);space();routes();for(const p of planets)planet(p);ship();drawCards();prompt();if(state==="ready"||state==="complete")overlay()}
  function space(){let g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#07142b");g.addColorStop(.56,"#030916");g.addColorStop(1,"#01030a");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(const s of stars){ctx.globalAlpha=s.a;ctx.fillStyle="#edfaff";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
  function routes(){ctx.strokeStyle="rgba(105,231,255,.16)";ctx.setLineDash([8,12]);ctx.beginPath();ctx.moveTo(planets[0].x,planets[0].y);planets.slice(1).forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();ctx.stroke();ctx.setLineDash([])}
  function planet(p){ctx.save();ctx.translate(p.x,p.y);let aura=ctx.createRadialGradient(0,0,p.r*.35,0,0,p.r*1.75);aura.addColorStop(0,rgba(p.color,.36));aura.addColorStop(1,rgba(p.color,0));ctx.fillStyle=aura;ctx.beginPath();ctx.arc(0,0,p.r*1.75,0,Math.PI*2);ctx.fill();let body=ctx.createRadialGradient(-16,-18,5,0,0,p.r);body.addColorStop(0,"#fff");body.addColorStop(.18,rgba(p.color,.95));body.addColorStop(1,rgba(p.color,.42));ctx.fillStyle=body;ctx.beginPath();ctx.arc(0,0,p.r,0,Math.PI*2);ctx.fill();ctx.strokeStyle=done.has(p.id)?"#ffd166":explored.has(p.id)?"#76f3a5":"rgba(255,255,255,.62)";ctx.lineWidth=done.has(p.id)?4:2;ctx.stroke();ctx.fillStyle="#061020";ctx.font="800 15px Segoe UI";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(p.icon,0,1);ctx.fillStyle="#edfaff";ctx.font="13px Segoe UI";ctx.fillText(p.name,0,p.r+22);ctx.restore()}
  function ship(){ctx.save();ctx.translate(player.x,player.y);ctx.rotate(player.angle);ctx.fillStyle="#69e7ff";ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(14,16);ctx.lineTo(0,8);ctx.lineTo(-14,16);ctx.closePath();ctx.fill();ctx.fillStyle="#ffd166";ctx.beginPath();ctx.moveTo(-6,15);ctx.lineTo(0,26+Math.sin(time*18)*4);ctx.lineTo(6,15);ctx.fill();ctx.restore()}
  function drawCards(){for(const c of cards){let tt=1-c.life/c.max,e=1-(1-tt)**3,x=lerp(c.x,c.tx,e),y=lerp(c.y,c.ty,e);ctx.globalAlpha=Math.sin(Math.PI*Math.min(1,tt))*.95;ctx.fillStyle="rgba(5,14,30,.92)";ctx.strokeStyle=c.c;ctx.lineWidth=2;rr(x-42,y-18,84,36,7);ctx.fill();ctx.stroke();ctx.fillStyle="#edfaff";ctx.font="12px Segoe UI";ctx.textAlign="center";ctx.fillText(c.label,x,y+4)}ctx.globalAlpha=1}
  function prompt(){if(state!=="playing")return;ctx.textAlign="center";ctx.fillStyle="rgba(237,250,255,.82)";ctx.font="15px Segoe UI";ctx.fillText(near?`靠近 ${near.name}，按 E 進入知識站`:"駕駛太空船靠近知識星球，按 E 開始檢索任務",W/2,40)}
  function overlay(){ctx.fillStyle="rgba(1,4,12,.72)";ctx.fillRect(0,0,W,H);ctx.fillStyle=state==="complete"?"#ffd166":"#edfaff";ctx.textAlign="center";ctx.font="800 42px Segoe UI";ctx.fillText(state==="complete"?"知識探險家":"知識星球探險",W/2,H/2-54);ctx.fillStyle="#98b5c6";ctx.font="18px Segoe UI";ctx.fillText(state==="complete"?`任務完成！累積知識能量 ${energy} 點`:"模擬 RAG：檢索知識庫、顯示來源、整理回答",W/2,H/2+2);ctx.fillStyle="#edfaff";ctx.font="16px Segoe UI";ctx.fillText("按 Enter 開始，靠近星球按 E，輸入問題後按 Enter 查詢",W/2,H/2+48)}
  function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}function rgba(hex,a){let v=parseInt(hex.replace("#",""),16);return`rgba(${v>>16&255},${v>>8&255},${v&255},${a})`}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function lerp(a,b,t){return a+(b-a)*t}function esc(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m]))}
  function loop(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);draw();requestAnimationFrame(loop)}hud();requestAnimationFrame(loop);
</script>
</body>
</html>
