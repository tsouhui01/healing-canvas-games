<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>夢想畫布｜自由粒子繪畫</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;color:#effbff;font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 18% 16%,rgba(107,231,255,.22),transparent 22rem),radial-gradient(circle at 82% 78%,rgba(255,139,190,.18),transparent 22rem),linear-gradient(135deg,#07111f,#16102a 55%,#071727)}
    main{width:min(96vw,1180px);padding:16px;border:1px solid rgba(127,230,255,.3);border-radius:16px;background:rgba(6,16,31,.78);box-shadow:0 28px 80px rgba(0,0,0,.42),inset 0 0 44px rgba(119,229,255,.06);backdrop-filter:blur(16px)}
    .top{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:12px}h1{margin:0;font-size:clamp(1.4rem,3vw,2.2rem);text-shadow:0 0 18px rgba(107,231,255,.35)}
    .stats,.tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.chip,.tool{padding:8px 11px;border:1px solid rgba(127,230,255,.28);border-radius:9px;background:rgba(255,255,255,.065);color:#aecaD8;font:inherit}.chip strong{margin-left:6px;color:#fff}.tool{cursor:pointer;transition:.18s}.tool:hover,.tool.active{transform:translateY(-2px);border-color:#7fe6ff;color:#fff;background:rgba(127,230,255,.16)}
    input[type=color]{width:42px;height:36px;padding:2px;border:1px solid rgba(127,230,255,.32);border-radius:9px;background:rgba(255,255,255,.08)}input[type=range]{width:130px;accent-color:#7fe6ff}
    .canvasBox{position:relative;width:100%;aspect-ratio:16/9;border:1px solid rgba(127,230,255,.42);border-radius:14px;overflow:hidden;background:#07111f;box-shadow:inset 0 0 70px rgba(127,230,255,.08)}canvas{display:block;width:100%;height:100%;touch-action:none}
    .help{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px;color:#aecaD8;font-size:.92rem}kbd{padding:2px 7px;border:1px solid rgba(255,255,255,.25);border-radius:6px;background:rgba(255,255,255,.08);color:#fff}
  </style>
</head>
<body>
<main>
  <section class="top">
    <h1>夢想畫布</h1>
    <div class="stats">
      <span class="chip">創作點數<strong id="points">0</strong></span>
      <span class="chip">時間<strong id="time">00:00</strong></span>
      <span class="chip">筆畫<strong id="strokes">0</strong></span>
      <span class="chip">顏色<strong id="colors">0</strong></span>
      <span class="chip">稱號<strong id="titleName">靈感暖身中</strong></span>
    </div>
  </section>
  <section class="tools">
    <button class="tool active" data-brush="normal">一般畫筆</button>
    <button class="tool" data-brush="rainbow">彩虹筆</button>
    <button class="tool" data-brush="star">星光筆</button>
    <button class="tool" data-brush="eraser">橡皮擦</button>
    <label class="chip">顏色 <input id="color" type="color" value="#7fe6ff"></label>
    <label class="chip">粗細 <input id="size" type="range" min="3" max="46" value="16"></label>
  </section>
  <section class="canvasBox"><canvas id="canvas"></canvas></section>
  <section class="help"><span><kbd>Enter</kbd> 開始／重新開始　<kbd>C</kbd> 清除畫布　<kbd>R</kbd> 隨機背景</span><span>滑鼠或觸控拖曳即可創作</span></section>
</main>
<script>
  // 夢想畫布：自由粒子繪畫。使用兩層 Canvas，底層保存作品，上層繪製即時粒子與光暈。
  const canvas=document.getElementById("canvas"),ctx=canvas.getContext("2d");
  const pointsEl=document.getElementById("points"),timeEl=document.getElementById("time"),strokesEl=document.getElementById("strokes"),colorsEl=document.getElementById("colors"),titleEl=document.getElementById("titleName"),colorEl=document.getElementById("color"),sizeEl=document.getElementById("size");
  const tools=[...document.querySelectorAll(".tool")];
  const art=document.createElement("canvas"),act=document.createElement("canvas"),artCtx=art.getContext("2d"),actCtx=act.getContext("2d");
  let W=0,H=0,brush="normal",drawing=false,last=null,started=false,startTime=0,points=0,strokes=0,hue=0,bgHue=210;
  const usedColors=new Set(),particles=[];
  function resize(){const r=canvas.getBoundingClientRect(),old=artCtx.getImageData?null:null;canvas.width=art.width=act.width=Math.floor(r.width*devicePixelRatio);canvas.height=art.height=act.height=Math.floor(r.height*devicePixelRatio);W=canvas.width;H=canvas.height;randomBackground(false)}
  addEventListener("resize",resize);resize();
  tools.forEach(b=>b.onclick=()=>{brush=b.dataset.brush;tools.forEach(x=>x.classList.toggle("active",x===b));usedColors.add(brush);hud()});
  addEventListener("keydown",e=>{if(e.code==="Enter")start();if(e.code==="KeyC")clearArt();if(e.code==="KeyR")randomBackground(true)});
  canvas.addEventListener("pointerdown",e=>{if(!started)start();drawing=true;last=pos(e);strokes++;usedColors.add(colorEl.value);canvas.setPointerCapture(e.pointerId);drawPoint(last.x,last.y)});
  canvas.addEventListener("pointermove",e=>{if(!drawing)return;const p=pos(e);drawLine(last,p);last=p});
  canvas.addEventListener("pointerup",()=>{if(drawing){points+=10;drawing=false;hud()}});
  canvas.addEventListener("pointercancel",()=>drawing=false);
  function start(){started=true;startTime=performance.now();points=0;strokes=0;usedColors.clear();particles.length=0;clearArt();hud()}
  function clearArt(){artCtx.clearRect(0,0,W,H);randomBackground(false);hud()}
  function randomBackground(addPoint){bgHue=Math.floor(Math.random()*360);const g=artCtx.createLinearGradient(0,0,W,H);g.addColorStop(0,`hsl(${bgHue},55%,10%)`);g.addColorStop(.55,`hsl(${(bgHue+45)%360},50%,15%)`);g.addColorStop(1,`hsl(${(bgHue+120)%360},55%,11%)`);artCtx.fillStyle=g;artCtx.fillRect(0,0,W,H);if(addPoint){points+=5;hud()}}
  function pos(e){const r=canvas.getBoundingClientRect();return{x:(e.clientX-r.left)*devicePixelRatio,y:(e.clientY-r.top)*devicePixelRatio}}
  function drawPoint(x,y){drawLine({x,y},{x:x+.1,y:y+.1})}
  function drawLine(a,b){const size=+sizeEl.value*devicePixelRatio;artCtx.save();artCtx.lineCap="round";artCtx.lineJoin="round";artCtx.lineWidth=size;if(brush==="eraser"){artCtx.globalCompositeOperation="destination-out";artCtx.strokeStyle="rgba(0,0,0,1)"}else{artCtx.globalCompositeOperation="source-over";artCtx.shadowBlur=size*.75;artCtx.shadowColor=getColor();artCtx.strokeStyle=getColor()}artCtx.beginPath();artCtx.moveTo(a.x,a.y);artCtx.lineTo(b.x,b.y);artCtx.stroke();artCtx.restore();spawnParticles(b.x,b.y,size);points+=brush==="star"?2:1;hud()}
  function getColor(){if(brush==="rainbow"){hue=(hue+5)%360;return`hsl(${hue},95%,68%)`}if(brush==="star")return`hsl(${(hue+=9)%360},90%,78%)`;return colorEl.value}
  function spawnParticles(x,y,size){const count=brush==="star"?9:brush==="rainbow"?6:3;for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,s=Math.random()*size*.18+1;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,r:Math.random()*size*.12+1,life:Math.random()*.45+.25,color:getColor(),star:brush==="star"})}}
  function hud(){pointsEl.textContent=Math.floor(points);strokesEl.textContent=strokes;colorsEl.textContent=usedColors.size;const sec=started?Math.floor((performance.now()-startTime)/1000):0;timeEl.textContent=`${String(Math.floor(sec/60)).padStart(2,"0")}:${String(sec%60).padStart(2,"0")}`;titleEl.textContent=usedColors.size>=6?"色彩探索家":brush==="star"&&points>120?"星光畫家":points>260?"夢境創作者":"靈感暖身中"}
  function loop(){actCtx.clearRect(0,0,W,H);for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.life-=.016;if(p.life<=0){particles.splice(i,1);continue}actCtx.globalAlpha=Math.max(0,p.life);actCtx.fillStyle=p.color;actCtx.shadowBlur=18;actCtx.shadowColor=p.color;if(p.star)star(actCtx,p.x,p.y,p.r*2.2);else{actCtx.beginPath();actCtx.arc(p.x,p.y,p.r,0,Math.PI*2);actCtx.fill()}}actCtx.globalAlpha=1;ctx.clearRect(0,0,W,H);ctx.drawImage(art,0,0);ctx.drawImage(act,0,0);hud();requestAnimationFrame(loop)}
  function star(c,x,y,r){c.beginPath();for(let i=0;i<10;i++){const rr=i%2?r*.45:r,ang=-Math.PI/2+i*Math.PI/5;c.lineTo(x+Math.cos(ang)*rr,y+Math.sin(ang)*rr)}c.closePath();c.fill()}
  loop();
</script>
</body>
</html>
