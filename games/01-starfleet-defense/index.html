<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星際防線 Canvas 射擊遊戲</title>
  <style>
    :root {
      --bg: #050812;
      --panel: rgba(9, 18, 34, 0.78);
      --line: rgba(101, 224, 255, 0.38);
      --cyan: #5ee7ff;
      --amber: #ffd166;
      --red: #ff5c7a;
      --green: #70f0a0;
      --text: #e9fbff;
      --muted: #91a9b8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 50% 20%, rgba(94, 231, 255, 0.13), transparent 26rem),
        radial-gradient(circle at 20% 90%, rgba(255, 209, 102, 0.08), transparent 18rem),
        linear-gradient(180deg, #07101f 0%, var(--bg) 68%, #02040a 100%);
    }

    .frame {
      width: min(94vw, 960px);
      padding: 18px;
      border: 1px solid rgba(94, 231, 255, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.01)),
        var(--panel);
      box-shadow:
        0 22px 70px rgba(0, 0, 0, 0.48),
        inset 0 0 28px rgba(94, 231, 255, 0.05);
      backdrop-filter: blur(10px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.1rem, 3vw, 1.75rem);
      font-weight: 800;
      letter-spacing: 0;
      color: #f6feff;
      text-shadow: 0 0 16px rgba(94, 231, 255, 0.42);
    }

    .hud {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      font-size: 0.92rem;
    }

    .chip {
      min-width: 92px;
      padding: 7px 10px;
      border: 1px solid rgba(94, 231, 255, 0.28);
      border-radius: 6px;
      background: rgba(1, 10, 22, 0.62);
      color: var(--muted);
    }

    .chip strong {
      margin-left: 6px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #030711;
      box-shadow: inset 0 0 45px rgba(94, 231, 255, 0.08);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: auto;
    }

    .help {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      font-size: clamp(0.78rem, 2.3vw, 0.94rem);
      line-height: 1.6;
    }

    kbd {
      display: inline-grid;
      place-items: center;
      min-width: 1.75em;
      min-height: 1.55em;
      padding: 0 0.42em;
      border: 1px solid rgba(233, 251, 255, 0.28);
      border-bottom-color: rgba(233, 251, 255, 0.14);
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      font-family: inherit;
      font-size: 0.86em;
    }

    @media (max-width: 620px) {
      .frame {
        width: 96vw;
        padding: 12px;
      }

      .topbar {
        align-items: flex-start;
      }

      .hud {
        justify-content: flex-start;
      }

      .chip {
        min-width: auto;
      }
    }
  </style>
</head>
<body>
  <main class="frame" aria-label="HTML5 Canvas 射擊遊戲">
    <section class="topbar">
      <h1>星際防線</h1>
      <div class="hud">
        <div class="chip">分數<strong id="scoreText">0</strong></div>
        <div class="chip">生命<strong id="livesText">3</strong></div>
        <div class="chip">狀態<strong id="stateText">待命</strong></div>
      </div>
    </section>

    <section class="canvas-wrap">
      <canvas id="gameCanvas" width="960" height="540"></canvas>
    </section>

    <section class="help">
      <span><kbd>Enter</kbd> 開始／重新開始　<kbd>Space</kbd> 發射</span>
      <span><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或方向鍵移動</span>
    </section>
  </main>

  <script>
    /*
      星際防線：單檔 HTML5 Canvas 射擊遊戲
      操作：WASD / 方向鍵移動，Space 發射，Enter 開始或重新開始。
    */

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreText = document.getElementById("scoreText");
    const livesText = document.getElementById("livesText");
    const stateText = document.getElementById("stateText");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;

    const keys = new Set();
    const bullets = [];
    const enemies = [];
    const sparks = [];
    const stars = [];

    const player = {
      x: WIDTH / 2,
      y: HEIGHT - 78,
      w: 34,
      h: 42,
      speed: 310,
      cooldown: 0,
      invincible: 0
    };

    let score = 0;
    let lives = 3;
    let gameState = "ready"; // ready, playing, over
    let enemyTimer = 0;
    let lastTime = 0;

    // 建立多層星空，速度不同會產生深度感。
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * WIDTH,
        y: Math.random() * HEIGHT,
        r: Math.random() * 1.8 + 0.35,
        speed: Math.random() * 55 + 20,
        alpha: Math.random() * 0.65 + 0.25
      });
    }

    window.addEventListener("keydown", (event) => {
      const code = event.code;

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(code)) {
        event.preventDefault();
      }

      if (code === "Enter") {
        startGame();
      }

      keys.add(code);
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    function startGame() {
      score = 0;
      lives = 3;
      gameState = "playing";
      enemyTimer = 0;
      bullets.length = 0;
      enemies.length = 0;
      sparks.length = 0;
      player.x = WIDTH / 2;
      player.y = HEIGHT - 78;
      player.cooldown = 0;
      player.invincible = 1.2;
      updateHud();
    }

    function updateHud() {
      scoreText.textContent = score;
      livesText.textContent = lives;
      stateText.textContent = gameState === "playing"
        ? "作戰中"
        : gameState === "over"
          ? "Game Over"
          : "待命";
    }

    function shoot() {
      if (player.cooldown > 0 || gameState !== "playing") return;

      bullets.push({
        x: player.x,
        y: player.y - player.h / 2,
        w: 5,
        h: 18,
        speed: 560
      });

      player.cooldown = 0.16;
    }

    function spawnEnemy() {
      const size = Math.random() * 18 + 25;
      const difficulty = 1 + score / 450;

      enemies.push({
        x: Math.random() * (WIDTH - size * 2) + size,
        y: -size,
        w: size,
        h: size,
        speed: (86 + Math.random() * 72) * difficulty,
        drift: (Math.random() - 0.5) * 70,
        spin: Math.random() * Math.PI * 2,
        hp: size > 38 ? 2 : 1
      });
    }

    function makeSparks(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 180 + 50;
        sparks.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: Math.random() * 0.35 + 0.25,
          maxLife: 0.6,
          color
        });
      }
    }

    function rectsOverlap(a, b) {
      return (
        a.x - a.w / 2 < b.x + b.w / 2 &&
        a.x + a.w / 2 > b.x - b.w / 2 &&
        a.y - a.h / 2 < b.y + b.h / 2 &&
        a.y + a.h / 2 > b.y - b.h / 2
      );
    }

    function update(dt) {
      updateStars(dt);

      if (gameState !== "playing") {
        updateSparks(dt);
        return;
      }

      const dx = Number(keys.has("KeyD") || keys.has("ArrowRight")) - Number(keys.has("KeyA") || keys.has("ArrowLeft"));
      const dy = Number(keys.has("KeyS") || keys.has("ArrowDown")) - Number(keys.has("KeyW") || keys.has("ArrowUp"));
      const length = Math.hypot(dx, dy) || 1;

      player.x += (dx / length) * player.speed * dt;
      player.y += (dy / length) * player.speed * dt;
      player.x = Math.max(player.w, Math.min(WIDTH - player.w, player.x));
      player.y = Math.max(player.h, Math.min(HEIGHT - player.h, player.y));

      player.cooldown = Math.max(0, player.cooldown - dt);
      player.invincible = Math.max(0, player.invincible - dt);

      if (keys.has("Space")) {
        shoot();
      }

      // 分數越高，生成間隔越短，敵人速度也會在 spawnEnemy 中提升。
      const spawnDelay = Math.max(0.33, 0.9 - score / 900);
      enemyTimer += dt;
      if (enemyTimer >= spawnDelay) {
        enemyTimer = 0;
        spawnEnemy();
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];
        bullet.y -= bullet.speed * dt;
        if (bullet.y + bullet.h < 0) bullets.splice(i, 1);
      }

      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];
        enemy.y += enemy.speed * dt;
        enemy.x += Math.sin(enemy.y * 0.025) * enemy.drift * dt;
        enemy.spin += dt * 3;

        if (enemy.y - enemy.h / 2 > HEIGHT + 20) {
          enemies.splice(i, 1);
          continue;
        }

        if (player.invincible <= 0 && rectsOverlap(player, enemy)) {
          enemies.splice(i, 1);
          loseLife();
          makeSparks(player.x, player.y, "#ff5c7a", 26);
        }
      }

      checkBulletHits();
      updateSparks(dt);
      updateHud();
    }

    function loseLife() {
      lives -= 1;
      player.invincible = 1.35;

      if (lives <= 0) {
        lives = 0;
        gameState = "over";
        makeSparks(player.x, player.y, "#ffd166", 46);
      }
    }

    function checkBulletHits() {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const enemy = enemies[i];

        for (let j = bullets.length - 1; j >= 0; j--) {
          const bullet = bullets[j];

          if (rectsOverlap(enemy, bullet)) {
            bullets.splice(j, 1);
            enemy.hp -= 1;
            makeSparks(bullet.x, bullet.y, "#5ee7ff", 8);

            if (enemy.hp <= 0) {
              score += enemy.w > 38 ? 25 : 10;
              makeSparks(enemy.x, enemy.y, "#ffd166", 20);
              enemies.splice(i, 1);
            }

            break;
          }
        }
      }
    }

    function updateStars(dt) {
      for (const star of stars) {
        star.y += star.speed * dt;
        if (star.y > HEIGHT) {
          star.y = -4;
          star.x = Math.random() * WIDTH;
        }
      }
    }

    function updateSparks(dt) {
      for (let i = sparks.length - 1; i >= 0; i--) {
        const spark = sparks[i];
        spark.x += spark.vx * dt;
        spark.y += spark.vy * dt;
        spark.vx *= 0.985;
        spark.vy *= 0.985;
        spark.life -= dt;

        if (spark.life <= 0) sparks.splice(i, 1);
      }
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      drawBackground();
      drawBullets();
      drawEnemies();
      drawPlayer();
      drawSparks();

      if (gameState !== "playing") {
        drawOverlay();
      }
    }

    function drawBackground() {
      const gradient = ctx.createLinearGradient(0, 0, 0, HEIGHT);
      gradient.addColorStop(0, "#071123");
      gradient.addColorStop(0.55, "#030815");
      gradient.addColorStop(1, "#01030a");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.save();
      ctx.strokeStyle = "rgba(94, 231, 255, 0.07)";
      ctx.lineWidth = 1;
      for (let y = 36; y < HEIGHT; y += 36) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(WIDTH, y);
        ctx.stroke();
      }
      ctx.restore();

      for (const star of stars) {
        ctx.globalAlpha = star.alpha;
        ctx.fillStyle = "#e9fbff";
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawPlayer() {
      const flicker = player.invincible > 0 && Math.floor(player.invincible * 12) % 2 === 0;
      if (flicker) return;

      ctx.save();
      ctx.translate(player.x, player.y);

      // 機體主形狀
      ctx.fillStyle = "#5ee7ff";
      ctx.shadowColor = "rgba(94, 231, 255, 0.85)";
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.moveTo(0, -player.h / 2);
      ctx.lineTo(player.w / 2, player.h / 2);
      ctx.lineTo(0, player.h / 3);
      ctx.lineTo(-player.w / 2, player.h / 2);
      ctx.closePath();
      ctx.fill();

      // 駕駛艙
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#e9fbff";
      ctx.beginPath();
      ctx.ellipse(0, -4, 5, 10, 0, 0, Math.PI * 2);
      ctx.fill();

      // 推進器火焰
      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.moveTo(-8, player.h / 2 - 2);
      ctx.lineTo(0, player.h / 2 + 16 + Math.random() * 8);
      ctx.lineTo(8, player.h / 2 - 2);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }

    function drawBullets() {
      for (const bullet of bullets) {
        const trail = ctx.createLinearGradient(bullet.x, bullet.y + bullet.h, bullet.x, bullet.y - bullet.h);
        trail.addColorStop(0, "rgba(94, 231, 255, 0)");
        trail.addColorStop(1, "#5ee7ff");
        ctx.fillStyle = trail;
        ctx.shadowColor = "rgba(94, 231, 255, 0.8)";
        ctx.shadowBlur = 12;
        roundRect(bullet.x - bullet.w / 2, bullet.y - bullet.h / 2, bullet.w, bullet.h, 3);
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    function drawEnemies() {
      for (const enemy of enemies) {
        ctx.save();
        ctx.translate(enemy.x, enemy.y);
        ctx.rotate(enemy.spin);
        ctx.fillStyle = enemy.hp > 1 ? "#ff8a5c" : "#ff5c7a";
        ctx.strokeStyle = "rgba(255, 255, 255, 0.55)";
        ctx.lineWidth = 2;
        ctx.shadowColor = "rgba(255, 92, 122, 0.55)";
        ctx.shadowBlur = 16;

        // 敵機用菱形與內部核心表示，不需要任何圖片素材。
        ctx.beginPath();
        ctx.moveTo(0, -enemy.h / 2);
        ctx.lineTo(enemy.w / 2, 0);
        ctx.lineTo(0, enemy.h / 2);
        ctx.lineTo(-enemy.w / 2, 0);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.shadowBlur = 0;
        ctx.fillStyle = "#190811";
        ctx.beginPath();
        ctx.arc(0, 0, enemy.w * 0.18, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawSparks() {
      for (const spark of sparks) {
        ctx.globalAlpha = Math.max(0, spark.life / spark.maxLife);
        ctx.fillStyle = spark.color;
        ctx.beginPath();
        ctx.arc(spark.x, spark.y, 2.4, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawOverlay() {
      ctx.save();
      ctx.fillStyle = "rgba(1, 4, 11, 0.66)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.strokeStyle = "rgba(94, 231, 255, 0.35)";
      ctx.lineWidth = 2;
      ctx.strokeRect(WIDTH / 2 - 220, HEIGHT / 2 - 90, 440, 180);

      ctx.fillStyle = "#e9fbff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "700 40px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText(gameState === "over" ? "GAME OVER" : "星際防線", WIDTH / 2, HEIGHT / 2 - 34);

      ctx.fillStyle = gameState === "over" ? "#ffd166" : "#91a9b8";
      ctx.font = "20px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText(gameState === "over" ? `最終分數：${score}` : "按 Enter 開始任務", WIDTH / 2, HEIGHT / 2 + 18);

      ctx.fillStyle = "#91a9b8";
      ctx.font = "16px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText("WASD / 方向鍵移動，Space 發射", WIDTH / 2, HEIGHT / 2 + 56);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function loop(time) {
      const dt = Math.min(0.033, (time - lastTime) / 1000 || 0);
      lastTime = time;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    updateHud();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
