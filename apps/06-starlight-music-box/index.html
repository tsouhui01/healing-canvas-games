<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星光音樂盒｜音符創作遊戲</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;color:#eefbff;font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;background:radial-gradient(circle at 50% 12%,rgba(120,210,255,.18),transparent 24rem),linear-gradient(180deg,#07142f,#030818 70%,#01030a)}
    main{width:min(96vw,1080px);padding:16px;border:1px solid rgba(125,225,255,.28);border-radius:14px;background:rgba(5,15,34,.82);box-shadow:0 28px 80px rgba(0,0,0,.45),inset 0 0 48px rgba(125,225,255,.06)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}h1{margin:0;font-size:clamp(1.35rem,3vw,2.1rem);text-shadow:0 0 18px rgba(125,225,255,.34)}
    .hud{display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;border:1px solid rgba(125,225,255,.28);border-radius:8px;background:rgba(255,255,255,.06);color:#9fb8cc}.chip strong{margin-left:6px;color:#fff}
    .box{width:100%;aspect-ratio:16/9;border:1px solid rgba(125,225,255,.38);border-radius:12px;overflow:hidden;background:#020713}canvas{display:block;width:100%;height:100%}.help{margin-top:12px;display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;color:#9fb8cc;font-size:.92rem}kbd{padding:2px 7px;border:1px solid rgba(255,255,255,.26);border-radius:6px;background:rgba(255,255,255,.08);color:#fff}
  </style>
</head>
<body>
<main>
  <section class="top"><h1>星光音樂盒</h1><div class="hud"><span class="chip">音符數<strong id="count">0 / 32</strong></span><span class="chip">播放次數<strong id="plays">0</strong></span><span class="chip">時間<strong id="time">00:00</strong></span><span class="chip">狀態<strong id="state">待開始</strong></span></div></section>
  <section class="box"><canvas id="game" width="960" height="540"></canvas></section>
  <section class="help"><span><kbd>Enter</kbd> 開始　<kbd>1</kbd>～<kbd>8</kbd> 或點擊星球創作音符</span><span><kbd>Space</kbd> 播放旋律　<kbd>Backspace</kbd> 刪除　<kbd>C</kbd> 清除</span></section>
</main>
<script>
  // 星光音樂盒：使用 Web Audio API 即時產生八個音高，不載入任何外部音樂檔案。
  const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  const countEl=document.getElementById("count"),playsEl=document.getElementById("plays"),timeEl=document.getElementById("time"),stateEl=document.getElementById("state");
  const notes=["Do","Re","Mi","Fa","Sol","La","Si","Do+"],freq=[261.63,293.66,329.63,349.23,392,440,493.88,523.25],colors=["#ff7da9","#ffb86b","#ffe66d","#80f2a5","#64e8ff","#8fb3ff","#c59cff","#ffffff"];
  const planets=notes.map((n,i)=>({n,f:freq[i],c:colors[i],x:115+i*105,y:230+Math.sin(i)*46,r:36,phase:i*.9}));
  const seq=[],ripples=[],stars=[];let audio=null,started=false,startTime=0,plays=0,playing=false,last=0,t=0,message="按 Enter 開始星光創作";
  for(let i=0;i<130;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.7+.3,a:Math.random()*.6+.2,s:Math.random()*20+6});
  addEventListener("keydown",e=>{if(["Space","Backspace"].includes(e.code))e.preventDefault();if(e.code==="Enter")start();if(/^Digit[1-8]$/.test(e.code))hit(+e.code.slice(5)-1);if(e.code==="Space")playMelody();if(e.code==="Backspace"){seq.pop();hud()}if(e.code==="KeyC"){seq.length=0;message="旋律已清空";hud()}});
  canvas.addEventListener("pointerdown",e=>{const r=canvas.getBoundingClientRect(),x=(e.clientX-r.left)*W/r.width,y=(e.clientY-r.top)*H/r.height;planets.forEach((p,i)=>{if(Math.hypot(x-p.x,y-p.y)<p.r+16)hit(i)})});
  function start(){started=true;startTime=performance.now();seq.length=0;plays=0;message="點擊音符星球，開始創作旋律";ensureAudio();hud()}
  function ensureAudio(){if(!audio)audio=new (window.AudioContext||window.webkitAudioContext)();if(audio.state==="suspended")audio.resume()}
  function hit(i){if(!started)start();ensureAudio();if(seq.length>=32){message="最多可記錄 32 個音符";return}seq.push(i);tone(planets[i].f,.25,planets[i].c);ripples.push({x:planets[i].x,y:planets[i].y,r:planets[i].r,life:.7,max:.7,c:planets[i].c});message=seq.length>=4?"完成四個以上音符，可以按 Space 播放完整旋律":"繼續加入音符，創作你的星光旋律";hud()}
  function tone(f,d,c){const now=audio.currentTime,o=audio.createOscillator(),g=audio.createGain(),filter=audio.createBiquadFilter();o.type="sine";o.frequency.value=f;filter.type="lowpass";filter.frequency.value=1500;o.connect(filter);filter.connect(g);g.connect(audio.destination);g.gain.setValueAtTime(.0001,now);g.gain.exponentialRampToValueAtTime(.2,now+.025);g.gain.exponentialRampToValueAtTime(.0001,now+d);o.start(now);o.stop(now+d+.04)}
  function playMelody(){if(!started)start();ensureAudio();if(seq.length<4){message="至少完成四個音符才能播放完整旋律";hud();return}if(playing)return;playing=true;plays++;message="正在播放你的星光旋律";seq.forEach((idx,k)=>setTimeout(()=>{tone(planets[idx].f,.28,planets[idx].c);ripples.push({x:planets[idx].x,y:planets[idx].y,r:planets[idx].r,life:.75,max:.75,c:planets[idx].c});if(k===seq.length-1){setTimeout(()=>{playing=false;message="這是一段很有想像力的旋律";hud()},360)}},k*340));hud()}
  function hud(){countEl.textContent=`${seq.length} / 32`;playsEl.textContent=plays;const s=started?Math.floor((performance.now()-startTime)/1000):0;timeEl.textContent=`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;stateEl.textContent=started?(playing?"播放中":"創作中"):"待開始"}
  function update(dt){t+=dt;for(const s of stars){s.y+=s.s*dt;if(s.y>H){s.y=-4;s.x=Math.random()*W}}for(let i=ripples.length-1;i>=0;i--){ripples[i].life-=dt;ripples[i].r+=120*dt;if(ripples[i].life<=0)ripples.splice(i,1)}}
  function draw(){ctx.clearRect(0,0,W,H);space();planets.forEach((p,i)=>planet(p,i));sequence();ripples.forEach(r=>{ctx.globalAlpha=r.life/r.max;ctx.strokeStyle=r.c;ctx.lineWidth=4;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke()});ctx.globalAlpha=1;ctx.fillStyle="#eefbff";ctx.textAlign="center";ctx.font="18px Segoe UI";ctx.fillText(message,W/2,70)}
  function space(){const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,"#071638");g.addColorStop(1,"#020713");ctx.fillStyle=g;ctx.fillRect(0,0,W,H);for(const s of stars){ctx.globalAlpha=s.a;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
  function planet(p,i){const y=p.y+Math.sin(t*1.6+p.phase)*12,g=ctx.createRadialGradient(p.x-12,y-14,3,p.x,y,p.r);g.addColorStop(0,"#fff");g.addColorStop(.28,p.c);g.addColorStop(1,"rgba(255,255,255,.12)");ctx.shadowColor=p.c;ctx.shadowBlur=20;ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,y,p.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle="#07142f";ctx.font="800 16px Segoe UI";ctx.textAlign="center";ctx.fillText(String(i+1),p.x,y+5);ctx.fillStyle="#eefbff";ctx.font="14px Segoe UI";ctx.fillText(p.n,p.x,y+p.r+24)}
  function sequence(){const y=H-70,cell=25,start=W/2-Math.min(seq.length,32)*cell/2;ctx.fillStyle="rgba(255,255,255,.08)";round(W/2-430,y-24,860,48,10);ctx.fill();seq.forEach((idx,i)=>{ctx.fillStyle=colors[idx];ctx.beginPath();ctx.arc(start+i*cell+12,y,8,0,Math.PI*2);ctx.fill()})}
  function round(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
  function loop(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);draw();hud();requestAnimationFrame(loop)}requestAnimationFrame(loop);
</script>
</body>
</html>
