<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧校園導覽員｜AI NPC 對話遊戲</title>
  <style>
    :root {
      --bg: #06111f;
      --panel: rgba(8, 20, 38, 0.88);
      --panel2: rgba(12, 32, 58, 0.92);
      --cyan: #64e8ff;
      --green: #80f2a5;
      --gold: #ffd166;
      --pink: #ff7da9;
      --text: #eefbff;
      --muted: #9bb6c7;
      --line: rgba(100, 232, 255, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--text);
      font-family: "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(100, 232, 255, 0.12), transparent 24rem),
        radial-gradient(circle at 82% 74%, rgba(128, 242, 165, 0.11), transparent 22rem),
        linear-gradient(180deg, #08182d 0%, var(--bg) 62%, #02050b 100%);
    }

    .app {
      width: min(96vw, 1160px);
      padding: 16px;
      border: 1px solid rgba(100, 232, 255, 0.24);
      border-radius: 12px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.015)),
        var(--panel);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.46),
        inset 0 0 38px rgba(100, 232, 255, 0.05);
      backdrop-filter: blur(14px);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.25rem, 3vw, 2rem);
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(100, 232, 255, 0.32);
    }

    .hud {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .chip {
      min-width: 112px;
      padding: 8px 10px;
      border: 1px solid rgba(100, 232, 255, 0.28);
      border-radius: 7px;
      background: rgba(2, 10, 22, 0.66);
      color: var(--muted);
      font-size: 0.9rem;
    }

    .chip strong {
      margin-left: 6px;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .game-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 12px;
      align-items: stretch;
    }

    .canvas-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #071520;
      box-shadow: inset 0 0 54px rgba(100, 232, 255, 0.07);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .mission-panel {
      min-height: 100%;
      padding: 14px;
      border: 1px solid rgba(100, 232, 255, 0.26);
      border-radius: 10px;
      background: rgba(3, 12, 25, 0.76);
    }

    .mission-panel h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      color: var(--cyan);
    }

    .mission {
      margin: 10px 0;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.11);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.9rem;
    }

    .mission.done {
      border-color: rgba(128, 242, 165, 0.38);
      color: #dfffe9;
      background: rgba(128, 242, 165, 0.08);
    }

    .badge-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .badge {
      padding: 7px 9px;
      border: 1px solid rgba(255, 209, 102, 0.32);
      border-radius: 999px;
      background: rgba(255, 209, 102, 0.08);
      color: var(--gold);
      font-size: 0.82rem;
    }

    .dialog {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 18px;
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 14px;
      border: 1px solid rgba(100, 232, 255, 0.4);
      border-radius: 10px;
      background: rgba(3, 10, 22, 0.92);
      box-shadow: 0 14px 42px rgba(0, 0, 0, 0.45);
    }

    .dialog.active {
      display: grid;
    }

    .dialog h2,
    .dialog h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--cyan);
    }

    .dialog p {
      margin: 0 0 10px;
      color: var(--muted);
      line-height: 1.52;
      font-size: 0.9rem;
    }

    .chat-log {
      height: 150px;
      overflow: auto;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.045);
      font-size: 0.88rem;
      line-height: 1.52;
    }

    .msg {
      margin-bottom: 8px;
    }

    .msg.user {
      color: #eafcff;
    }

    .msg.npc {
      color: #ccf8dc;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid rgba(100, 232, 255, 0.35);
      border-radius: 7px;
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      font: inherit;
    }

    input:focus {
      border-color: rgba(100, 232, 255, 0.78);
      box-shadow: 0 0 0 3px rgba(100, 232, 255, 0.12);
    }

    button {
      min-width: 82px;
      padding: 11px 12px;
      border: 1px solid rgba(100, 232, 255, 0.46);
      border-radius: 7px;
      background: rgba(100, 232, 255, 0.12);
      color: var(--text);
      font: inherit;
      cursor: pointer;
    }

    button:hover {
      background: rgba(100, 232, 255, 0.2);
    }

    .help {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 12px;
      color: var(--muted);
      line-height: 1.6;
      font-size: clamp(0.78rem, 2vw, 0.93rem);
    }

    kbd {
      display: inline-grid;
      place-items: center;
      min-width: 1.75em;
      min-height: 1.55em;
      margin: 0 0.1em;
      padding: 0 0.42em;
      border: 1px solid rgba(237, 250, 255, 0.28);
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      font-family: inherit;
      font-size: 0.86em;
    }

    @media (max-width: 920px) {
      .game-layout {
        grid-template-columns: 1fr;
      }

      .dialog.active {
        grid-template-columns: 1fr;
      }

      .dialog {
        max-height: 68%;
        overflow: auto;
      }
    }
  </style>
</head>
<body>
  <main class="app" aria-label="智慧校園導覽員 HTML5 Canvas AI NPC 對話遊戲">
    <section class="topbar">
      <h1>智慧校園導覽員</h1>
      <div class="hud">
        <div class="chip">知識點數<strong id="pointsText">0</strong></div>
        <div class="chip">解鎖地點<strong id="placesText">0 / 5</strong></div>
        <div class="chip">任務<strong id="missionText">0 / 3</strong></div>
        <div class="chip">位置<strong id="positionText">入口廣場</strong></div>
        <div class="chip">狀態<strong id="stateText">待命</strong></div>
      </div>
    </section>

    <section class="game-layout">
      <section class="canvas-shell">
        <canvas id="gameCanvas" width="920" height="520"></canvas>

        <aside id="dialogPanel" class="dialog" aria-label="NPC 對話視窗">
          <div>
            <h2 id="dialogTitle">AI 導覽員</h2>
            <p id="dialogIntro">請輸入你想詢問的校園問題。</p>
            <div class="input-row">
              <input id="chatInput" type="text" autocomplete="off" placeholder="例如：圖書館在哪裡？請假怎麼辦？" />
              <button id="sendButton" type="button">傳送</button>
            </div>
          </div>
          <div>
            <h3>最近五筆對話</h3>
            <div id="chatLog" class="chat-log">尚未開始對話。</div>
          </div>
        </aside>
      </section>

      <aside class="mission-panel">
        <h2>任務面板</h2>
        <div id="missionLibrary" class="mission">找到圖書館</div>
        <div id="missionLeave" class="mission">詢問請假方式</div>
        <div id="missionHealth" class="mission">找到健康中心</div>
        <h2 style="margin-top:16px;">徽章</h2>
        <div id="badgeList" class="badge-list">
          <span class="badge">尚未解鎖</span>
        </div>
      </aside>
    </section>

    <section class="help">
      <span><kbd>Enter</kbd> 開始　<kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 或方向鍵移動　靠近 NPC 按 <kbd>E</kbd></span>
      <span>對話中按 <kbd>Enter</kbd> 傳送，按 <kbd>Esc</kbd> 關閉對話</span>
    </section>
  </main>

  <script>
    /*
      智慧校園導覽員：HTML5 Canvas AI NPC 對話遊戲
      本遊戲使用本機規則式對話系統，不連接任何外部 AI API。
      對話知識直接儲存在 JavaScript 物件中，依照玩家輸入關鍵字回覆。
    */

    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const pointsText = document.getElementById("pointsText");
    const placesText = document.getElementById("placesText");
    const missionText = document.getElementById("missionText");
    const positionText = document.getElementById("positionText");
    const stateText = document.getElementById("stateText");
    const dialogPanel = document.getElementById("dialogPanel");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogIntro = document.getElementById("dialogIntro");
    const chatInput = document.getElementById("chatInput");
    const sendButton = document.getElementById("sendButton");
    const chatLog = document.getElementById("chatLog");
    const badgeList = document.getElementById("badgeList");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const keys = new Set();
    const sparkles = [];

    const player = {
      x: 116,
      y: 438,
      radius: 15,
      speed: 220,
      angle: 0
    };

    const buildings = [
      { id: "classroom", name: "教室", x: 82, y: 70, w: 190, h: 112, color: "#1e8fb5" },
      { id: "library", name: "圖書館", x: 354, y: 58, w: 210, h: 126, color: "#2baa78" },
      { id: "health", name: "健康中心", x: 654, y: 70, w: 182, h: 118, color: "#d96b7f" },
      { id: "office", name: "辦公室", x: 96, y: 286, w: 202, h: 114, color: "#c49a36" },
      { id: "computer", name: "電腦教室", x: 618, y: 296, w: 218, h: 114, color: "#8f75db" }
    ];

    const npcs = [
      { id: "guide", name: "AI 導覽員", x: 462, y: 260, color: "#64e8ff" },
      { id: "teacher", name: "行政老師", x: 224, y: 344, color: "#ffd166" },
      { id: "nurse", name: "護理師", x: 744, y: 220, color: "#ff7da9" },
      { id: "librarian", name: "圖書館員", x: 470, y: 212, color: "#80f2a5" },
      { id: "tech", name: "資訊助教", x: 730, y: 438, color: "#b89cff" }
    ];

    const dialogRules = {
      class: {
        keywords: ["上課", "課程", "教室", "鐘聲", "遲到", "課表"],
        answer: "上課資訊：教室位於地圖左上角。請依課表準時到班，若遲到需先向任課老師說明原因。"
      },
      library: {
        keywords: ["圖書館", "借書", "還書", "閱讀", "自習", "查資料"],
        answer: "圖書館資訊：圖書館在校園北側中央，提供借還書、自習座位與資料查詢服務。借書請攜帶學生證。"
      },
      leave: {
        keywords: ["請假", "病假", "事假", "公假", "缺席", "假單"],
        answer: "請假方式：先告知導師或行政老師，再依學校規定填寫假單。病假可補交證明，事假建議事前申請。"
      },
      club: {
        keywords: ["社團", "活動", "報名", "才藝", "午休", "課後"],
        answer: "社團資訊：社團通常於午休或課後公告招生，可至辦公室或學務處查看報名表與活動時間。"
      },
      health: {
        keywords: ["健康", "受傷", "生病", "護理", "健康中心", "不舒服", "發燒"],
        answer: "健康中心資訊：健康中心在校園右上方。身體不舒服、受傷或需要量體溫時，可以請老師陪同前往。"
      },
      computer: {
        keywords: ["電腦", "網路", "密碼", "帳號", "列印", "程式", "資訊"],
        answer: "電腦教室資訊：電腦教室在校園右下方。若忘記帳號密碼、網路異常或需要使用設備，請找資訊助教協助。"
      }
    };

    const missions = {
      library: false,
      leave: false,
      health: false
    };

    const unlockedPlaces = new Set();
    const unlockedBadges = new Set();
    const chatHistory = [];

    let gameState = "ready"; // ready, playing, dialog, complete
    let activeNpc = null;
    let nearbyNpc = null;
    let knowledgePoints = 0;
    let lastTime = 0;
    let time = 0;

    for (let i = 0; i < 55; i++) {
      sparkles.push({
        x: Math.random() * WIDTH,
        y: Math.random() * HEIGHT,
        r: Math.random() * 1.8 + 0.5,
        a: Math.random() * 0.45 + 0.16,
        speed: Math.random() * 10 + 4
      });
    }

    window.addEventListener("keydown", (event) => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(event.code)) {
        event.preventDefault();
      }

      if (event.code === "Enter") {
        if (gameState === "ready" || gameState === "complete") {
          startGame();
        } else if (gameState === "dialog" && document.activeElement === chatInput) {
          sendMessage();
        }
      }

      if (event.code === "KeyE" && gameState === "playing" && nearbyNpc) {
        openDialog(nearbyNpc);
      }

      if (event.code === "Escape" && gameState === "dialog") {
        closeDialog();
      }

      keys.add(event.code);
    });

    window.addEventListener("keyup", (event) => {
      keys.delete(event.code);
    });

    sendButton.addEventListener("click", sendMessage);

    function startGame() {
      gameState = "playing";
      player.x = 116;
      player.y = 438;
      player.angle = 0;
      activeNpc = null;
      nearbyNpc = null;
      knowledgePoints = 0;
      unlockedPlaces.clear();
      unlockedBadges.clear();
      chatHistory.length = 0;
      missions.library = false;
      missions.leave = false;
      missions.health = false;
      dialogPanel.classList.remove("active");
      chatInput.value = "";
      chatLog.textContent = "尚未開始對話。";
      updateHud();
      updateMissionPanel();
    }

    function openDialog(npc) {
      activeNpc = npc;
      gameState = "dialog";
      dialogPanel.classList.add("active");
      dialogTitle.textContent = npc.name;
      dialogIntro.textContent = "請詢問校園資訊，例如：圖書館在哪裡？請假怎麼辦？健康中心在哪？";
      if (chatHistory.length === 0) {
        addChat("npc", `${npc.name}：你好，我可以回答上課、圖書館、請假、社團、健康、電腦等校園問題。`);
      }
      setTimeout(() => chatInput.focus(), 60);
      updateHud();
    }

    function closeDialog() {
      gameState = "playing";
      activeNpc = null;
      dialogPanel.classList.remove("active");
      updateHud();
    }

    function sendMessage() {
      if (gameState !== "dialog") return;

      const question = chatInput.value.trim();
      if (!question) return;

      addChat("user", `你：${question}`);
      const response = getNpcResponse(question);
      addChat("npc", `${activeNpc ? activeNpc.name : "AI 導覽員"}：${response.answer}`);
      chatInput.value = "";

      if (response.matched) {
        knowledgePoints += response.firstTime ? 15 : 5;
        unlockBadgeByTopic(response.topic);
      }

      checkQuestionMissions(question, response.topic);
      checkAllComplete();
      updateHud();
      updateMissionPanel();
    }

    function getNpcResponse(question) {
      const normalized = question.toLowerCase();
      let bestKey = null;
      let bestScore = 0;

      // 規則式 AI NPC：依關鍵字命中數計分，選出最相關回答。
      for (const [key, rule] of Object.entries(dialogRules)) {
        let score = 0;
        for (const keyword of rule.keywords) {
          if (normalized.includes(keyword.toLowerCase())) score += 1;
        }
        if (score > bestScore) {
          bestScore = score;
          bestKey = key;
        }
      }

      if (!bestKey) {
        return {
          matched: false,
          topic: null,
          firstTime: false,
          answer: "我目前還無法辨識這個問題。你可以問我：圖書館在哪裡、請假怎麼辦、健康中心在哪、社團如何報名、電腦教室怎麼使用。"
        };
      }

      const firstTime = !unlockedBadges.has(bestKey);
      return {
        matched: true,
        topic: bestKey,
        firstTime,
        answer: dialogRules[bestKey].answer
      };
    }

    function addChat(type, text) {
      chatHistory.push({ type, text });
      while (chatHistory.length > 5) chatHistory.shift();

      chatLog.innerHTML = chatHistory
        .map((msg) => `<div class="msg ${msg.type}">${escapeHtml(msg.text)}</div>`)
        .join("");
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function unlockBadgeByTopic(topic) {
      const names = {
        class: "準時上課",
        library: "閱讀雷達",
        leave: "請假小幫手",
        club: "社團探索",
        health: "健康守護",
        computer: "資訊通"
      };
      if (names[topic]) unlockedBadges.add(names[topic]);
    }

    function checkQuestionMissions(question, topic) {
      const q = question.toLowerCase();
      if (topic === "leave" || q.includes("請假")) {
        missions.leave = true;
        unlockedBadges.add("請假任務");
      }
    }

    function updateExplorationByPosition() {
      for (const building of buildings) {
        const inside =
          player.x > building.x &&
          player.x < building.x + building.w &&
          player.y > building.y &&
          player.y < building.y + building.h;

        if (inside) {
          unlockedPlaces.add(building.id);
          if (building.id === "library") {
            missions.library = true;
            unlockedBadges.add("圖書館發現者");
          }
          if (building.id === "health") {
            missions.health = true;
            unlockedBadges.add("健康中心發現者");
          }
        }
      }
    }

    function checkAllComplete() {
      if (missions.library && missions.leave && missions.health) {
        gameState = "complete";
        dialogPanel.classList.remove("active");
        unlockedBadges.add("校園探索達人");
      }
    }

    function update(dt) {
      time += dt;
      updateSparkles(dt);
      if (gameState !== "playing") return;

      const dx = Number(keys.has("KeyD") || keys.has("ArrowRight")) - Number(keys.has("KeyA") || keys.has("ArrowLeft"));
      const dy = Number(keys.has("KeyS") || keys.has("ArrowDown")) - Number(keys.has("KeyW") || keys.has("ArrowUp"));
      const len = Math.hypot(dx, dy) || 1;

      if (dx || dy) player.angle = Math.atan2(dy, dx);
      player.x += (dx / len) * player.speed * dt;
      player.y += (dy / len) * player.speed * dt;
      player.x = clamp(player.x, player.radius, WIDTH - player.radius);
      player.y = clamp(player.y, player.radius, HEIGHT - player.radius);

      updateExplorationByPosition();
      nearbyNpc = findNearbyNpc();
      updateHud();
      updateMissionPanel();
    }

    function updateSparkles(dt) {
      for (const s of sparkles) {
        s.y += s.speed * dt;
        if (s.y > HEIGHT) {
          s.y = -4;
          s.x = Math.random() * WIDTH;
        }
      }
    }

    function findNearbyNpc() {
      for (const npc of npcs) {
        if (Math.hypot(player.x - npc.x, player.y - npc.y) < 56) return npc;
      }
      return null;
    }

    function currentPlaceName() {
      for (const building of buildings) {
        if (
          player.x > building.x &&
          player.x < building.x + building.w &&
          player.y > building.y &&
          player.y < building.y + building.h
        ) {
          return building.name;
        }
      }
      return "校園步道";
    }

    function updateHud() {
      pointsText.textContent = knowledgePoints;
      placesText.textContent = `${unlockedPlaces.size} / ${buildings.length}`;
      missionText.textContent = `${completedMissionCount()} / 3`;
      positionText.textContent = currentPlaceName();
      stateText.textContent =
        gameState === "ready" ? "待命" :
        gameState === "playing" ? "探索中" :
        gameState === "dialog" ? "對話中" :
        "校園探索達人";
    }

    function updateMissionPanel() {
      document.getElementById("missionLibrary").classList.toggle("done", missions.library);
      document.getElementById("missionLeave").classList.toggle("done", missions.leave);
      document.getElementById("missionHealth").classList.toggle("done", missions.health);

      document.getElementById("missionLibrary").textContent = `${missions.library ? "完成" : "任務"}：找到圖書館`;
      document.getElementById("missionLeave").textContent = `${missions.leave ? "完成" : "任務"}：詢問請假方式`;
      document.getElementById("missionHealth").textContent = `${missions.health ? "完成" : "任務"}：找到健康中心`;

      badgeList.innerHTML = unlockedBadges.size
        ? [...unlockedBadges].map((badge) => `<span class="badge">${escapeHtml(badge)}</span>`).join("")
        : `<span class="badge">尚未解鎖</span>`;
    }

    function completedMissionCount() {
      return Number(missions.library) + Number(missions.leave) + Number(missions.health);
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      drawCampus();
      drawBuildings();
      drawNpcs();
      drawPlayer();
      drawPrompt();

      if (gameState === "ready" || gameState === "complete") {
        drawOverlay();
      }
    }

    function drawCampus() {
      const ground = ctx.createLinearGradient(0, 0, WIDTH, HEIGHT);
      ground.addColorStop(0, "#10314a");
      ground.addColorStop(0.48, "#0b2636");
      ground.addColorStop(1, "#09202e");
      ctx.fillStyle = ground;
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      ctx.lineWidth = 1;
      for (let x = 30; x < WIDTH; x += 44) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x - 70, HEIGHT);
        ctx.stroke();
      }
      for (let y = 34; y < HEIGHT; y += 44) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(WIDTH, y);
        ctx.stroke();
      }
      ctx.restore();

      drawPath(0, 238, WIDTH, 238, 52);
      drawPath(455, 0, 455, HEIGHT, 46);
      drawPath(110, 438, 805, 438, 44);

      for (const s of sparkles) {
        ctx.globalAlpha = s.a;
        ctx.fillStyle = "#eefbff";
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawPath(x1, y1, x2, y2, width) {
      ctx.save();
      ctx.strokeStyle = "rgba(190, 220, 226, 0.18)";
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();

      ctx.strokeStyle = "rgba(255, 255, 255, 0.12)";
      ctx.lineWidth = 2;
      ctx.setLineDash([10, 16]);
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.restore();
    }

    function drawBuildings() {
      for (const b of buildings) {
        const found = unlockedPlaces.has(b.id);
        ctx.save();
        ctx.fillStyle = found ? hexToRgba(b.color, 0.62) : hexToRgba(b.color, 0.42);
        ctx.strokeStyle = found ? "#80f2a5" : "rgba(255,255,255,0.35)";
        ctx.lineWidth = found ? 3 : 2;
        roundRect(b.x, b.y, b.w, b.h, 10);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "rgba(255,255,255,0.14)";
        for (let i = 0; i < 4; i++) {
          ctx.fillRect(b.x + 22 + i * 38, b.y + 28, 22, 18);
        }

        ctx.fillStyle = "#eefbff";
        ctx.font = "800 18px Segoe UI, Microsoft JhengHei, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(b.name, b.x + b.w / 2, b.y + b.h / 2 + 18);
        ctx.restore();
      }
    }

    function drawNpcs() {
      for (const npc of npcs) {
        const near = nearbyNpc && nearbyNpc.id === npc.id && gameState === "playing";
        ctx.save();
        ctx.translate(npc.x, npc.y);

        ctx.fillStyle = near ? "rgba(100,232,255,0.2)" : "rgba(255,255,255,0.08)";
        ctx.beginPath();
        ctx.arc(0, 0, near ? 34 + Math.sin(time * 8) * 3 : 26, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = npc.color;
        ctx.beginPath();
        ctx.arc(0, -8, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillRect(-10, 6, 20, 22);

        ctx.fillStyle = "#06111f";
        ctx.beginPath();
        ctx.arc(-4, -10, 2, 0, Math.PI * 2);
        ctx.arc(4, -10, 2, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#eefbff";
        ctx.font = "12px Segoe UI, Microsoft JhengHei, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(npc.name, 0, 42);

        if (near) {
          ctx.fillStyle = "rgba(3,10,22,0.86)";
          ctx.strokeStyle = "rgba(100,232,255,0.5)";
          ctx.lineWidth = 1.5;
          roundRect(-48, -62, 96, 28, 6);
          ctx.fill();
          ctx.stroke();
          ctx.fillStyle = "#64e8ff";
          ctx.font = "13px Segoe UI, Microsoft JhengHei, sans-serif";
          ctx.fillText("按 E 對話", 0, -44);
        }

        ctx.restore();
      }
    }

    function drawPlayer() {
      ctx.save();
      ctx.translate(player.x, player.y);
      ctx.rotate(player.angle);

      ctx.shadowColor = "rgba(255, 209, 102, 0.46)";
      ctx.shadowBlur = 14;
      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.arc(0, 0, player.radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.fillStyle = "#2d2440";
      ctx.beginPath();
      ctx.arc(-5, -4, 2.2, 0, Math.PI * 2);
      ctx.arc(5, -4, 2.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#64e8ff";
      ctx.fillRect(-9, 10, 18, 12);

      ctx.restore();
    }

    function drawPrompt() {
      if (gameState !== "playing") return;

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "rgba(3, 10, 22, 0.78)";
      ctx.strokeStyle = "rgba(100, 232, 255, 0.36)";
      ctx.lineWidth = 1.5;
      roundRect(WIDTH / 2 - 205, 16, 410, 42, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#eefbff";
      ctx.font = "15px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText(nearbyNpc ? `靠近 ${nearbyNpc.name}，按 E 開啟對話` : "探索校園地圖，靠近 NPC 可詢問校園資訊", WIDTH / 2, 38);
      ctx.restore();
    }

    function drawOverlay() {
      ctx.save();
      ctx.fillStyle = "rgba(1, 5, 12, 0.72)";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      ctx.fillStyle = "rgba(5, 18, 34, 0.9)";
      ctx.strokeStyle = "rgba(100, 232, 255, 0.38)";
      ctx.lineWidth = 2;
      roundRect(WIDTH / 2 - 285, HEIGHT / 2 - 118, 570, 236, 12);
      ctx.fill();
      ctx.stroke();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = gameState === "complete" ? "#ffd166" : "#eefbff";
      ctx.font = "800 40px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText(gameState === "complete" ? "校園探索達人" : "智慧校園導覽員", WIDTH / 2, HEIGHT / 2 - 54);

      ctx.fillStyle = "#9bb6c7";
      ctx.font = "18px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText(
        gameState === "complete"
          ? `任務完成！累積知識點數 ${knowledgePoints} 點`
          : "本機規則式 AI NPC，協助查詢校園資訊",
        WIDTH / 2,
        HEIGHT / 2 + 2
      );

      ctx.fillStyle = "#eefbff";
      ctx.font = "16px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText("按 Enter 開始，WASD / 方向鍵移動，靠近 NPC 按 E 對話", WIDTH / 2, HEIGHT / 2 + 48);

      ctx.fillStyle = "#80f2a5";
      ctx.font = "15px Segoe UI, Microsoft JhengHei, sans-serif";
      ctx.fillText("任務：找到圖書館、詢問請假方式、找到健康中心", WIDTH / 2, HEIGHT / 2 + 78);
      ctx.restore();
    }

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function hexToRgba(hex, alpha) {
      const value = parseInt(hex.replace("#", ""), 16);
      const r = (value >> 16) & 255;
      const g = (value >> 8) & 255;
      const b = value & 255;
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000 || 0);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    updateHud();
    updateMissionPanel();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
