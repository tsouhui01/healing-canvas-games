<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>心光泡泡｜HTML5 Canvas 情緒療癒遊戲</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;overflow:hidden;font-family:"Segoe UI","Noto Sans TC","Microsoft JhengHei",sans-serif;color:#66556b;background:linear-gradient(135deg,#ffe4ee,#fff2bf,#dfffdc,#dff6ff,#ecdfff)}
    main{width:min(94vw,980px);padding:18px;border:1px solid rgba(255,255,255,.85);border-radius:18px;background:rgba(255,255,255,.58);box-shadow:0 28px 70px rgba(108,82,122,.2);backdrop-filter:blur(16px)}
    .top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px}h1{margin:0;font-size:clamp(1.35rem,3vw,2.1rem)}
    .hud{display:flex;gap:8px;flex-wrap:wrap}.pill{padding:8px 12px;border:1px solid rgba(255,255,255,.9);border-radius:999px;background:rgba(255,255,255,.58);color:#88778c}.pill strong{margin-left:6px;color:#66556b}
    .wrap{width:100%;aspect-ratio:16/9;border:2px solid rgba(255,255,255,.9);border-radius:16px;overflow:hidden;box-shadow:inset 0 0 60px rgba(255,255,255,.65),0 16px 42px rgba(109,86,118,.16)}canvas{display:block;width:100%;height:100%}
    .help{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-top:12px;color:#7d7185;font-size:.92rem}kbd{padding:2px 7px;border:1px solid rgba(100,80,110,.22);border-radius:6px;background:rgba(255,255,255,.72)}
  </style>
</head>
<body>
<main>
  <section class="top">
    <h1>心光泡泡</h1>
    <div class="hud">
      <div class="pill">分數<strong id="scoreText">0</strong></div>
      <div class="pill">生命<strong id="livesText">3</strong></div>
      <div class="pill">狀態<strong id="stateText">待開始</strong></div>
    </div>
  </section>
  <section class="wrap"><canvas id="game" width="960" height="540"></canvas></section>
  <section class="help"><span><kbd>Enter</kbd> 開始／重新開始　<kbd>Space</kbd> 溫柔脈衝</span><span><kbd>WASD</kbd> 或方向鍵移動愛心</span></section>
</main>
<script>
  // 心光泡泡：控制愛心收集笑臉泡泡，避開哭臉泡泡。純 HTML5 Canvas，不使用外部套件。
  const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),W=canvas.width,H=canvas.height;
  const scoreText=document.getElementById("scoreText"),livesText=document.getElementById("livesText"),stateText=document.getElementById("stateText");
  const keys=new Set(),bubbles=[],motes=[],ripples=[];
  const player={x:W/2,y:H/2+120,r:23,speed:275,inv:0,pulse:0};
  let score=0,lives=3,state="ready",timer=0,last=0,t=0;
  for(let i=0;i<95;i++)motes.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*2.4+.7,s:Math.random()*22+10,a:Math.random()*.38+.18,w:Math.random()*6});
  addEventListener("keydown",e=>{if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code))e.preventDefault();if(e.code==="Enter")start();keys.add(e.code)});
  addEventListener("keyup",e=>keys.delete(e.code));
  function start(){score=0;lives=3;state="playing";timer=0;bubbles.length=0;ripples.length=0;Object.assign(player,{x:W/2,y:H/2+120,inv:1.1,pulse:0});hud()}
  function hud(){scoreText.textContent=score;livesText.textContent=lives;stateText.textContent=state==="playing"?"療癒中":state==="over"?"休息一下":"待開始"}
  function spawn(){const happy=Math.random()>.34,r=Math.random()*12+23,level=1+score/520;bubbles.push({x:Math.random()*(W-r*2)+r,y:H+r,type:happy?"happy":"sad",r,s:(42+Math.random()*44)*level,w:Math.random()*6,phase:Math.random()*9})}
  function pulse(){if(state!=="playing"||player.pulse>0)return;player.pulse=4.8;ripples.push({x:player.x,y:player.y,r:18,m:132,life:.65,max:.65,c:"rgba(255,255,255,.85)"});for(const b of bubbles){const d=Math.hypot(b.x-player.x,b.y-player.y);if(b.type==="sad"&&d<135){b.y+=75;b.x+=b.x<player.x?-38:38}}}
  function update(dt){t+=dt;for(const m of motes){m.y-=m.s*dt;m.x+=Math.sin(t+m.w)*10*dt;if(m.y<-8){m.y=H+8;m.x=Math.random()*W}}for(let i=ripples.length-1;i>=0;i--){const r=ripples[i];r.life-=dt;r.r+=(r.m-r.r)*.08;if(r.life<=0)ripples.splice(i,1)}if(state!=="playing")return;
    const dx=(keys.has("KeyD")||keys.has("ArrowRight"))-(keys.has("KeyA")||keys.has("ArrowLeft")),dy=(keys.has("KeyS")||keys.has("ArrowDown"))-(keys.has("KeyW")||keys.has("ArrowUp")),len=Math.hypot(dx,dy)||1;
    player.x=Math.max(player.r,Math.min(W-player.r,player.x+dx/len*player.speed*dt));player.y=Math.max(player.r,Math.min(H-player.r,player.y+dy/len*player.speed*dt));player.inv=Math.max(0,player.inv-dt);player.pulse=Math.max(0,player.pulse-dt);if(keys.has("Space"))pulse();
    timer+=dt;if(timer>Math.max(.38,.92-score/850)){timer=0;spawn()}
    for(let i=bubbles.length-1;i>=0;i--){const b=bubbles[i];b.y-=b.s*dt;b.x+=Math.sin(t*2+b.phase)*b.w*dt*8;if(b.y+b.r<-20){bubbles.splice(i,1);continue}if(Math.hypot(player.x-b.x,player.y-b.y)<player.r+b.r*.78){if(b.type==="happy"){score+=10;ripples.push({x:b.x,y:b.y,r:b.r,m:b.r+44,life:.55,max:.55,c:"#ffbf6e"})}else if(player.inv<=0){lives--;player.inv=1.4;ripples.push({x:player.x,y:player.y,r:18,m:70,life:.55,max:.55,c:"#ff8aa8"});if(lives<=0){lives=0;state="over"}}bubbles.splice(i,1)}}hud()}
  function draw(){ctx.clearRect(0,0,W,H);bg();for(const b of bubbles)drawBubble(b);drawHeart();for(const r of ripples){ctx.globalAlpha=Math.max(0,r.life/r.max);ctx.strokeStyle=r.c;ctx.lineWidth=4;ctx.beginPath();ctx.arc(r.x,r.y,r.r,0,Math.PI*2);ctx.stroke()}ctx.globalAlpha=1;if(state!=="playing")overlay()}
  function bg(){const g=ctx.createLinearGradient(0,0,W,H);["#ffe6ef","#fff1bd","#dcffd8","#d8f4ff","#e7d9ff"].forEach((c,i)=>g.addColorStop(i/4,c));ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=.45;ctx.lineWidth=18;["#ff8ca9","#ffc66d","#fff08b","#9be7b7","#88dfff","#c9b2ff"].forEach((c,i)=>{ctx.strokeStyle=c;ctx.beginPath();ctx.arc(W/2+Math.sin(t)*20,H*.98,410-i*30,Math.PI*1.08,Math.PI*1.92);ctx.stroke()});ctx.globalAlpha=1;for(const m of motes){ctx.globalAlpha=m.a;ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
  function drawHeart(){if(player.inv>0&&Math.floor(player.inv*12)%2===0)return;ctx.save();ctx.translate(player.x,player.y);ctx.scale(1+Math.sin(t*5)*.035,1+Math.sin(t*5)*.035);heart(0,2,28,"#ff6f9a");heart(0,-1,17,"#ffd3df");ctx.restore()}
  function heart(x,y,s,c){ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(x,y+s*.34);ctx.bezierCurveTo(x-s,y-s*.28,x-s*.45,y-s,x,y-s*.48);ctx.bezierCurveTo(x+s*.45,y-s,x+s,y-s*.28,x,y+s*.34);ctx.fill()}
  function drawBubble(b){ctx.save();ctx.translate(b.x,b.y);const g=ctx.createRadialGradient(-b.r*.3,-b.r*.35,2,0,0,b.r);if(b.type==="happy"){g.addColorStop(0,"#fff");g.addColorStop(.45,"rgba(255,230,144,.78)");g.addColorStop(1,"rgba(255,166,109,.44)")}else{g.addColorStop(0,"#fff");g.addColorStop(.45,"rgba(186,217,255,.76)");g.addColorStop(1,"rgba(156,139,222,.42)")};ctx.fillStyle=g;ctx.strokeStyle="rgba(255,255,255,.82)";ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,b.r,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle=b.type==="happy"?"#7d5b46":"#665980";ctx.beginPath();ctx.arc(-b.r*.28,-b.r*.12,b.r*.075,0,Math.PI*2);ctx.arc(b.r*.28,-b.r*.12,b.r*.075,0,Math.PI*2);ctx.fill();ctx.lineWidth=2.4;ctx.beginPath();if(b.type==="happy")ctx.arc(0,b.r*.06,b.r*.34,.18*Math.PI,.82*Math.PI);else ctx.arc(0,b.r*.42,b.r*.31,1.18*Math.PI,1.82*Math.PI);ctx.stroke();ctx.restore()}
  function overlay(){ctx.fillStyle="rgba(255,248,251,.68)";ctx.fillRect(0,0,W,H);ctx.fillStyle="#6a526f";ctx.textAlign="center";ctx.font="800 42px Segoe UI";ctx.fillText(state==="over"?"休息一下":"心光泡泡",W/2,H/2-36);ctx.font="20px Segoe UI";ctx.fillText(state==="over"?`這次收集了 ${score} 分的微笑`:"按 Enter 開始療癒旅程",W/2,H/2+18);ctx.font="16px Segoe UI";ctx.fillText("收集笑臉泡泡，避開哭臉泡泡",W/2,H/2+56)}
  function loop(now){const dt=Math.min(.033,(now-last)/1000||0);last=now;update(dt);draw();requestAnimationFrame(loop)}hud();requestAnimationFrame(loop);
</script>
</body>
</html>
